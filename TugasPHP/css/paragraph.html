<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paragraph</title>
    <style>
        body {
            font-family: arial, sans-serif;
            background-color: aliceblue;
            padding: 40px;
        }
        p {
            background-color: aliceblue;
            padding: 5px;
            margin-bottom: 15px;
            border-left: 5px solid #3498db;
            border-radius: 5px;
            line-height: 1.6;
        }
        p:hover {
            background-color: aliceblue;
        }

    </style>
</head>
<body>
    <p>This is a simple paragraph</p>
    <p>This is a simple paragraph</p>
    <p>This is a simple paragraph</p>
</body>
</html>
