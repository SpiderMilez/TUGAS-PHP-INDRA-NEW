<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header</title>
    <style>
        body{
            font-family: arial, sans-serif;
            background-color: aliceblue;
            padding: 40px;
        }
        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            margin-bottom: 10px;
        }
        h1 {
            color:#2c3e50;
            border-bottom: 3px solid #3498db;
            padding-bottom: 10px;
        }
        h2{
            color: #34495e;
        }
        h3{
             color: #555; 
        }
         h4 {
        color: #666;
       }
       h5 {
        color: #777;
       }
       h6 {
        color: #888;
        font-style: italic; 
      }
    </style>
</head>
<body>
    <h1>This is a Header</h1>
    <h2>This is a Subheader</h2>
    <h3>This is a Subheader</h3>
    <h4>This is a Subheader</h4>
    <h5>This is a Subheader</h5>
    <h6>This is a Subheader</h6>
</body>
</html>
