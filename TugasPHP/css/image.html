<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image</title>
    <style>
        body{
            font-family: arial, sans-serif;
            background-color: aliceblue;
            padding: 40px;
            text-align: center;
        }
        img{
            width: 200px;
            margin: 15px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        img:hover {
            transform: scale(1.05);
            transition: 0.3s;
        }
    </style>
</head>
<body>
    <img src="LogoMetschoo.png" alt="Logo Metland School Internal File" />
    <img
      src="./assets/img/LogoMetschoo.png"
      alt="Logo Metland School Internal File with Relative Path"
    />
    <img
      src="https://smkmetland.net/ppdb/wp-content/uploads/2022/11/cropped-cropped-cropped-LOGO-SMK-METLAND2-copy-1024x1024-4.png"
      alt="Logo Metland School Eksternal File"
    />
</body>
</html>
