<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
    <style>
        body {
            font-family: arial, sans-serif;
            background-color: aliceblue;
            padding: 40px;
        }
        h1 {
            color: #2c3e50;
            margin-top: 30px;
        }
        ul,
        ol {
            background-color: aliceblue;
            padding: 20px;
            border-radius: 8px;
            width: 250px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        li {
            padding: 5px 0;
        }
        li:hover {
            color: #3498db;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Unordered List</h1>
    <ul>
      <li>Item 1</li>
      <li>Item 2</li>
      <li>Item 3</li>
    </ul>
    <h1>Ordered List</h1>
    <ol>
      <li>Item 1</li>
      <li>Item 2</li>
      <li>Item 3</li>
    </ol>
</body>
</html>
