<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video</title>
    <style>
        body {
            font-family: arial, sans-serif;
            background-color: antiquewhite;
            padding: 40px;
            text-align: center;
        }
        video {
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }

    </style>
</head>
<body>
    <video controls>
        <source src="video.mp4" type="video/mp4" />
    </video>
</body>
</html>
