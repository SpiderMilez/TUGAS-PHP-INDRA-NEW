<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <style>
        body{
            font-family: arial, sans-serif;
            background-color: aliceblue;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        form{
            background-color: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow:  0 0 10px rgba(0, 0, 0, 0.1);
            width: 300px;
        }
        label{
            font-weight: bold;
        }
        input, 
        select{
            width: 100%;
            padding: 8px;
            margin-top:5px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius:4px;
        }
        button{
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color:aliceblue;
            border:none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
        background-color: #0056b3; 
      }
    </style>
</head>
<body>
    <form>
        <label for="name">Name:</label>
      <input type="text" id="name" name="name" />
      <label for="email">Email:</label>
      <input type="email" id="email" name="email" />

      
      <label>Jurusan</label>
      <select>
        <option>PPLG</option>
        <option>DKV</option>
        <option>AKL</option>
      </select>

   
      <button type="submit" value="Submit">Submit</button>
    </form>
</body>
</html>
